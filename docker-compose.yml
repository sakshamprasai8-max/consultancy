version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: educonsultpro-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: educonsultpro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educonsultpro-api
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/educonsultpro?schema=public"
      JWT_SECRET: "dev-jwt-secret-change-in-production-minimum-32-characters"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-in-production-minimum-32-chars"
      PORT: "5000"
      NODE_ENV: "development"
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: educonsultpro-web
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
